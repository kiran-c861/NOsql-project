<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-users"></i> Employee Management System</h1>
            <p>Manage your workforce efficiently and effectively</p>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Form Section -->
            <section class="form-section">
                <h2><i class="fas fa-user-plus"></i> Employee Details</h2>
                <form id="employeeForm">
                    <input type="hidden" id="employeeId">

                    <div class="form-group">
                        <label for="name"><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="name" placeholder="Enter full name" required>
                    </div>

                    <div class="form-group">
                        <label for="department"><i class="fas fa-building"></i> Department</label>
                        <input type="text" id="department" placeholder="Enter department" required>
                    </div>

                    <div class="form-group">
                        <label for="salary"><i class="fas fa-dollar-sign"></i> Salary</label>
                        <input type="number" id="salary" placeholder="Enter salary" min="0" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="email" placeholder="Enter email address" required>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <i class="fas fa-save"></i> Add Employee
                        </button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn" style="display: none;">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </form>
            </section>

            <!-- Content Section -->
            <section class="content-section">
                <!-- Search and Filter -->
                <section class="search-filter">
                    <h3><i class="fas fa-search"></i> Search & Filter</h3>

                    <div class="search-input">
                        <input type="text" id="searchInput" placeholder="Search employees by name, department, or email...">
                        <button class="btn btn-primary" id="searchBtn">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>

                    <div class="filter-controls">
                        <input type="number" id="salaryFilter" placeholder="Min salary" min="0" step="0.01">
                        <button class="btn btn-primary" id="filterBtn">
                            <i class="fas fa-filter"></i> Filter by Salary
                        </button>
                        <button class="btn btn-secondary" id="clearFilterBtn">
                            <i class="fas fa-eraser"></i> Clear
                        </button>
                    </div>
                </section>

                <!-- Employee List -->
                <section class="employee-list">
                    <h3>
                        <span><i class="fas fa-users"></i> Employees</span>
                        <span id="employeeCount">0</span>
                    </h3>

                    <!-- Employee Stats -->
                    <div class="employee-stats" id="employeeStats" style="display: none;">
                        <div class="stat-item">
                            <div class="stat-number" id="totalEmployees">0</div>
                            <div class="stat-label">Total</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="avgSalary">$0</div>
                            <div class="stat-label">Avg Salary</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="totalDepartments">0</div>
                            <div class="stat-label">Departments</div>
                        </div>
                    </div>

                    <!-- Employee Grid -->
                    <div id="employeeGrid" class="employee-grid">
                        <!-- Employee cards will be inserted here -->
                    </div>
                </section>
            </section>
        </main>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
